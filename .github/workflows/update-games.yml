name: Update game list

on:
  schedule:
    - cron: '0 21 * * *'   # 毎日 6:00 JST に実行
  workflow_dispatch:        # 手動実行も可能

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate games.json
        run: python update_games.py

      - name: Commit & push (with rebase retry)
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add games.json
          if git diff --cached --quiet; then
            echo 'No changes in games.json'
            exit 0
          fi
          git commit -m 'chore: update games.json (auto)'
          for i in 1 2 3; do
            if git push; then exit 0; fi
            git pull --rebase
            sleep 5
          done
          exit 1
